<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kindergarten Incinerator</title>

<style>
body {
    margin: 0;
    background: #050505;
    color: #eaeaea;
    font-family: Arial, sans-serif;
}

/* 导航栏 */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px;
    background: rgba(0,0,0,0.6);
    text-align: center;
}

nav a {
    margin: 0 20px;
    color: #8a2b2b;
    text-decoration: none;
}

nav a:hover {
    color: #c94b4b;
}

/* 首页 */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #150000 0%, #000 100%);
}

.hero h1 {
    font-size: 48px;
    letter-spacing: 4px;
    color: #7a1f1f;
}

.hero p {
    color: #555;
}

/* 分区 */
.section {
    padding: 100px 20px;
    max-width: 900px;
    margin: auto;
}

.section h2 {
    border-bottom: 1px solid #300000;
    padding-bottom: 10px;
    color: #8a2b2b;
}

/* 子分类标题 */
.sub-title {
    margin-top: 40px;
    color: #c94b4b;
}

/* 项目卡片 */
.project {
    margin-top: 20px;
    padding: 20px;
    border: 1px solid #200000;
}

.project:hover {
    border-color: #7a1f1f;
}

/* 链接 */
a.link {
    color: #8a2b2b;
    text-decoration: underline;
}

a.link:hover {
    color: #c94b4b;
}
</style>
</head>

<body>

<!-- 导航 -->
<nav>
    <a href="#projects">Projects</a>
    <a href="#art">Art</a>
    <a href="#about">About</a>
</nav>

<!-- 首页 -->
<div class="hero">
    <h1>Kindergarten Incinerator</h1>
    <p>Indie Game Studio / Indie Manga Studio</p>
</div>

<!-- Projects -->
<div class="section" id="projects">
    <h2>Projects</h2>

    <!-- GameJam -->
    <h3 class="sub-title">GameJam</h3>

    <div class="project">
        <h4>Spooktober 6th Annual Visual Novel Jam — 3rd Place</h4>
        <a class="link" href="https://itch.io/" target="_blank">
            View on itch.io
        </a>
    </div>

    <!-- Indie Projects -->
    <h3 class="sub-title">Indie Projects</h3>

    <div class="project">
        <h4>Terminal Stroll（终末漫游）</h4>
        <p>WIP - A narrative-driven exploration game.</p>
    </div>

</div>

<!-- Art -->
<div class="section" id="art">
    <h2>Art</h2>
    <p>Coming soon...</p>
</div>

<!-- About -->
<div class="section" id="about">
    <h2>About</h2>
    <p>Coming soon...</p>
</div>

</body>
</html>
